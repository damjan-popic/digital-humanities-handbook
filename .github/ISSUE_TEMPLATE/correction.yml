name: Report a correction or broken workflow
about: Report a factual, methodological, technical, accessibility or rights problem.
title: "Correction: "
labels: [correction]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong and why does it matter?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reproduction steps or supporting evidence
  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options: [Editorial improvement, Broken instruction, Incorrect research claim, Rights/privacy concern, Security concern]
    validations:
      required: true
