name: Update Slovene ecosystem labels

on:
  push:
    branches: [chore/slovene-ecosystem-labels]
    paths:
      - .github/workflows/update-slovenian-ecosystem-labels.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: chore/slovene-ecosystem-labels

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply wording and test updates
        run: |
          python - <<'PY'
          from pathlib import Path

          labels = Path('scripts/intertextuality.py')
          text = labels.read_text(encoding='utf-8')
          replacements = {
              'Nadaljujte po ekosistemu': 'Sprehodite se po ekosistemu',
              'Preizkusite praktični postopek': 'Preizkusite postopek v praksi',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected label: {old}')
              text = text.replace(old, new)
          labels.write_text(text, encoding='utf-8')

          smoke = Path('scripts/check_rendered_ecosystem.py')
          test_text = smoke.read_text(encoding='utf-8')
          anchor = '''    inspect_page(\n        "workflows/text-analysis/analyse-emotion-with-a-lexicon-and-manual-check/index.html",'''
          block = '''    inspect_page(\n        "sl/chapters/what-is-digital-humanities/index.html",\n        (\n            "Sprehodite se po ekosistemu",\n            "Preizkusite postopek v praksi",\n            "Oglejte si študijo primera",\n        ),\n        (\n            "make-a-tiny-digital-edition-of-a-historical-text/",\n            "ladakh-relations/",\n        ),\n        failures,\n    )\n'''
          if block not in test_text:
              if anchor not in test_text:
                  raise SystemExit('Could not find rendered-check insertion point')
              test_text = test_text.replace(anchor, block + anchor, 1)
          smoke.write_text(test_text, encoding='utf-8')
          PY

          python scripts/build_review_manuscripts.py

      - name: Commit regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/intertextuality.py scripts/check_rendered_ecosystem.py release/review-manuscript-sl.md
          git diff --cached --quiet && exit 0
          git commit -m "Use preferred Slovene ecosystem labels"
          git push origin HEAD:chore/slovene-ecosystem-labels
