name: Regenerate audit manuscripts (temporary)

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    if: github.head_ref == 'audit/intertextual-ecosystem'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate review manuscripts
        run: make manuscripts

      - name: Commit generated manuscripts
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- release/review-manuscript-en.md release/review-manuscript-sl.md; then
            echo "Review manuscripts are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/review-manuscript-en.md release/review-manuscript-sl.md
          git commit -m "Regenerate intertextual review manuscripts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
