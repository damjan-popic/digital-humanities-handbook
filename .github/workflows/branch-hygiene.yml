name: Merged branch hygiene

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/branch-hygiene.yml
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Enable automatic cleanup and remove stale merged branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh api --method PATCH "repos/${GITHUB_REPOSITORY}" \
            -F delete_branch_on_merge=true >/dev/null

          default_branch=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)
          deleted=()
          failed=()

          mapfile -t merged_heads < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls?state=closed&per_page=100" \
              --jq '.[] | select(.merged_at != null and .head.repo.full_name == .base.repo.full_name) | .head.ref' \
              | sort -u
          )

          for branch in "${merged_heads[@]}"; do
            [[ -n "${branch}" && "${branch}" != "${default_branch}" ]] || continue

            encoded=$(python - "${branch}" <<'PY'
          import sys
          from urllib.parse import quote
          print(quote(sys.argv[1], safe=""))
          PY
            )

            if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${encoded}" >/dev/null 2>&1; then
              continue
            fi

            if gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${encoded}"; then
              deleted+=("${branch}")
            else
              failed+=("${branch}")
            fi
          done

          {
            echo "## Merged branch hygiene"
            echo
            echo "Automatic deletion of merged branches: **enabled**"
            echo
            if ((${#deleted[@]})); then
              echo "Deleted branches:"
              printf -- '- `%s`\n' "${deleted[@]}"
            else
              echo "No stale merged branches were present."
            fi
            if ((${#failed[@]})); then
              echo
              echo "Branches that could not be deleted:"
              printf -- '- `%s`\n' "${failed[@]}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          ((${#failed[@]} == 0))
