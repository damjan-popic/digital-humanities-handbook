name: Build a tagged handbook release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: make check
      - name: Build release archives
        run: |
          mkdir -p dist
          git archive --format=zip --prefix=digital-humanities-handbook-${GITHUB_REF_NAME}/ \
            -o dist/digital-humanities-handbook-${GITHUB_REF_NAME}-source.zip HEAD
          zip -qr dist/digital-humanities-handbook-${GITHUB_REF_NAME}-site.zip site
          cp release/review-manuscript-en.md dist/
          cp release/review-manuscript-sl.md dist/
          cp release/translation-coverage.md dist/
          sha256sum dist/* > dist/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: digital-humanities-handbook-${{ github.ref_name }}
          path: dist/
