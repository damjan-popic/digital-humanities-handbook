name: One-time merged branch cleanup

on:
  push:
    branches:
      - audit/intertextual-ecosystem

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale merged branches and enable future auto-delete
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh api --method PATCH "repos/${GITHUB_REPOSITORY}" \
            -F delete_branch_on_merge=true >/dev/null

          default_branch=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)
          current_branch=${GITHUB_REF_NAME}
          deleted=()
          skipped=()

          mapfile -t merged_heads < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls?state=closed&per_page=100" \
              --jq '.[] | select(.merged_at != null and .head.repo.full_name == .base.repo.full_name) | .head.ref' \
              | sort -u
          )

          for branch in "${merged_heads[@]}"; do
            if [[ -z "${branch}" || "${branch}" == "${default_branch}" || "${branch}" == "${current_branch}" ]]; then
              skipped+=("${branch}")
              continue
            fi

            encoded=$(python - "${branch}" <<'PY'
          import sys
          from urllib.parse import quote
          print(quote(sys.argv[1], safe=""))
          PY
            )

            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${encoded}" >/dev/null 2>&1; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${encoded}"
              deleted+=("${branch}")
            fi
          done

          {
            echo "## Merged branch cleanup"
            echo
            echo "Automatic deletion of merged branches: enabled"
            echo
            if ((${#deleted[@]})); then
              echo "Deleted branches:"
              printf -- '- `%s`\n' "${deleted[@]}"
            else
              echo "No stale merged branches were present."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
