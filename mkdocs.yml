site_name: Digital Humanities Handbook
site_description: An open, bilingual and versioned handbook for digital humanities methods.
site_author: Damjan Popič and contributors
site_url: https://damjan-popic.github.io/digital-humanities-handbook/
repo_url: https://github.com/damjan-popic/digital-humanities-handbook
repo_name: damjan-popic/digital-humanities-handbook
edit_uri: edit/main/docs/
copyright: "Open educational resource. Text: CC BY 4.0. Code: MIT."

theme:
  name: material
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: sl
          name: Slovenščina
          build: true
          site_name: Priročnik za digitalno humanistiko
          site_description: Odprti, dvojezični in verzionirani priročnik za metode digitalne humanistike.
          copyright: "Odprti učni vir. Besedila: CC BY 4.0. Koda: MIT."
          nav:
            - Domov: index.md
            - Priročnik:
                - Kako uporabljati priročnik: chapters/index.md
                - Kaj je digitalna humanistika?: chapters/what-is-digital-humanities.md
                - Zgodovine in genealogije digitalne humanistike: chapters/history-of-digital-humanities.md
                - Modeli, dokazno gradivo in interpretacija: chapters/models-evidence-interpretation.md
                - "Infrastrukture digitalne humanistike: moč, dostop in vzdrževanje": chapters/critical-infrastructures.md
                - "Digitalna humanistika v Sloveniji: infrastrukture, jeziki in skupnosti": chapters/digital-humanities-in-slovenia.md
                - Od vprašanja do metode: chapters/research-design.md
                - Podatki, metapodatki in modeli: chapters/data-metadata-models.md
                - Besedila, korpusi in OCR: chapters/texts-corpora-ocr.md
                - Jezikoslovna anotacija in CLASSLA: chapters/linguistic-annotation-classla.md
                - Analiza besedil: chapters/text-analysis.md
                - Teme, sentiment in čustva: chapters/topics-emotions-classification.md
                - Podatkovne zbirke in SQL: chapters/databases-sql.md
                - GIS in prostorska humanistika: chapters/gis-spatial-humanities.md
                - Omrežja in vizualizacija: chapters/networks-visualization.md
                - UI, etika in ponovljivost: chapters/ai-ethics-reproducibility.md
                - Živi odprti priročnik: chapters/open-living-handbook.md
            - Učne poti:
                - Pregled: learning-paths/index.md
                - Pismenost za informacijsko družbo: learning-paths/pismenost-za-informacijsko-druzbo.md
                - Digitalna slovenistika: learning-paths/digitalna-slovenistika.md
            - Praktični postopki: workflows/index.md
            - Študije primerov: case-studies/index.md
            - Viri:
                - Slovar: resources/glossary.md
                - Orodja: resources/tools.md
                - Etični kontrolni seznam: resources/ethics-checklist.md
            - Prispevajte: contribute/index.md
            - O projektu: about.md
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/site.js

validation:
  nav:
    omitted_files: ignore

nav:
  - Home: index.md
  - Handbook:
      - How to use the handbook: chapters/index.md
      - What is digital humanities?: chapters/what-is-digital-humanities.md
      - Histories and genealogies of digital humanities: chapters/history-of-digital-humanities.md
      - Models, evidence and interpretation: chapters/models-evidence-interpretation.md
      - "Infrastructures of digital humanities: power, access and maintenance": chapters/critical-infrastructures.md
      - "Digital humanities in Slovenia: infrastructures, languages and communities": chapters/digital-humanities-in-slovenia.md
      - From question to method: chapters/research-design.md
      - Data, metadata and models: chapters/data-metadata-models.md
      - Texts, corpora and OCR: chapters/texts-corpora-ocr.md
      - Linguistic annotation and CLASSLA: chapters/linguistic-annotation-classla.md
      - Text analysis: chapters/text-analysis.md
      - Topics, sentiment and emotion: chapters/topics-emotions-classification.md
      - Databases and SQL: chapters/databases-sql.md
      - GIS and spatial humanities: chapters/gis-spatial-humanities.md
      - Networks and visualization: chapters/networks-visualization.md
      - AI, ethics and reproducibility: chapters/ai-ethics-reproducibility.md
      - The living open handbook: chapters/open-living-handbook.md
  - Learning paths:
      - Overview: learning-paths/index.md
      - Information Society Literacy: learning-paths/pismenost-za-informacijsko-druzbo.md
      - Digital Slovenian Studies: learning-paths/digitalna-slovenistika.md
  - Workflows: workflows/index.md
  - Case studies: case-studies/index.md
  - Resources:
      - Glossary: resources/glossary.md
      - Tools: resources/tools.md
      - Ethics checklist: resources/ethics-checklist.md
  - Contribute: contribute/index.md
  - About: about.md
